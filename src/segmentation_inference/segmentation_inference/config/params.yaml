# ---------------------------------------------------------------------------
# 1. SENSOR  (Ouster OS0‑128 – adjust if you use a different LiDAR)
# ---------------------------------------------------------------------------
sensor:
  name: "ouster_os0_128"
  sensor_type: "ouster"             
  num_channels: 128                
  fov_up: 45.0                      
  fov_down: -45.0                   
  max_range: 100.0                  
  min_range: 1.0                    
  intensity_max: 65535.0            
  intensity_min: 0.0

# ---------------------------------------------------------------------------
# 2. MODEL  (architecture, classes, colours)
# ---------------------------------------------------------------------------
model:
  name: "thab_8class"               
  architecture: "rangenetpp"        
  num_classes: 7                    
  input_channels: 5                 
  height: 128                       
  width: 2048                      

  # Class names (index → human‑readable label)
  names:
    0: "unlabeled"
    1: "car"
    2: "person"
    3: "road"
    4: "building"
    5: "vegetation"
    6: "parking"

  # RGB colour map (0‑255) – used for visualisation in RViz
  color_map:
    0: [0,   0,   0  ]   # unlabeled – black
    1: [255, 0,   0  ]   # car – red
    2: [0,   255, 255]   # person – cyan
    3: [128, 0,   128]   # road – purple
    4: [70,  70,  70 ]   # building – dark grey
    5: [0,   255, 0  ]   # vegetation – green
    6: [255, 255, 0  ]   # parking – yellow
  
  # Paths to pretrained checkpoints (optional, used by some scripts)
  checkpoints:
    salsanext:  "models/models/pretrained_models/THAB_salsanext.pth"
    rangenet++: "models/models/pretrained_models/rangenet_os0.pth"

# ---------------------------------------------------------------------------
# 4. LABEL MAPPING  (raw dataset ID → training class index)
# ---------------------------------------------------------------------------
label_map:
  # SemanticTHAB raw labels (may vary for your dataset)
  0:   0    # unlabeled
  1:   0    # outlier           → unlabeled

  10:  1    # car               → car
  30:  2    # person            → person
  254: 2    # moving_person     → person (merged)
  40:  3    # road              → road
  50:  4    # building          → building
  70:  5    # vegetation        → vegetation
  48:  6    # parking           → parking

inference:
  device: "cuda"
  batch_size: 1
  save_predictions: true

# ROS topics
topics:
  input_pointcloud: "/ouster/points"            # Input topic from Ouster
  output_colored: "/rangenet/colored_cloud"     # Output with colors
  output_labels: "/rangenet/labels"             # Output labels only
  output_range_image: "/rangenet/range_image"   # Range image output

paths:
  model_weights: "models/trained/salsanext_sequence_00/salsanext_best.pth"  # FIX BUG-8
  class_names: "data/semantic/class_names.txt"
  predictions_dir: "results/predictions/"
  sequences_dir: "data/sequences/"

data:
  label_base_dir: "/home/ronak/3D/ouster_os0/ouster_os0/src/data/sequences/"   # ← CHANGE THIS TO YOUR ACTUAL SEMANTICTHAB ROOT