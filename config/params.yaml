# ---------------------------------------------------------------------------
# 1. SENSOR  (Ouster OS0‑128 )
# ---------------------------------------------------------------------------
sensor:
  name: "ouster_os0_128"
  sensor_type: "ouster"             
  num_channels: 128                
  fov_up: 45.0                      
  fov_down: -45.0                   
  max_range: 100.0                  
  min_range: 1.0                    
  intensity_max: 65535.0            
  intensity_min: 0.0

# ---------------------------------------------------------------------------
# 2. MODEL 
# ---------------------------------------------------------------------------
model:
  name: "thab_8class"               
  architecture: "rangenetpp"        
  num_classes: 7                    
  input_channels: 5                 
  height: 128                       
  width: 2048                      

  # Class names 
  names:
    0: "unlabeled"
    1: "car"
    2: "person"
    3: "road"
    4: "building"
    5: "vegetation"
    6: "parking"

  # RGB colour map 
  color_map:
    0: [0,   0,   0  ]   
    1: [255, 0,   0  ]
    2: [0,   255, 255]   
    3: [128, 0,   128]   
    4: [70,  70,  70 ]   
    5: [0,   255, 0  ]   
    6: [255, 255, 0  ]   
  
  checkpoints:
    salsanext:  "models/models/pretrained_models/THAB_salsanext.pth"
    rangenet++: "models/models/pretrained_models/rangenet_os0.pth"

# ---------------------------------------------------------------------------
# 4. LABEL MAPPING 
# ---------------------------------------------------------------------------
label_map:
  0:   0    # unlabeled
  1:   0    # outlier           

  10:  1    # car   
  30:  2    # person   
  254: 2    # moving_person     
  40:  3    # road   
  50:  4    # building        
  70:  5    # vegetation        
  48:  6    # parking        

inference:
  device: "cuda"
  batch_size: 1
  save_predictions: true

# ROS topics
topics:
  input_pointcloud: "/ouster/points"            
  output_colored: "/rangenet/colored_cloud"     
  output_labels: "/rangenet/labels"             
  output_range_image: "/rangenet/range_image"   

paths:
  model_weights: "models/trained/rangenetpp_sequence_00/rangenetpp_best.pth"
  class_names: "data/semantic/class_names.txt"
  predictions_dir: "results/predictions/"
  sequences_dir: "data/sequences/"
 